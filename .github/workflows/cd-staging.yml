name: CD - Deploy to Staging

on:
  push:
    branches: [staging]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Install production dependencies
        run: |
          cp package.json dist/
          cp package-lock.json dist/
          cd dist && npm ci --omit=dev
          rm package.json package-lock.json

      - name: Create deployment package
        run: cd dist && zip -r ../lambda.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda.zip
          retention-days: 5

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    env:
      AWS_REGION: us-east-1
      TF_VAR_db_host: ${{ secrets.DB_HOST }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_access_token_secret: ${{ secrets.JWT_ACCESS_TOKEN_SECRET }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=lambda-infrastructure/staging/terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan -var-file=environments/staging/terraform.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Lambda function name
        id: lambda
        run: |
          FUNCTION_NAME=$(terraform output -raw function_name)
          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: .

      - name: Deploy Lambda code
        working-directory: .
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.lambda.outputs.function_name }}" \
            --zip-file fileb://lambda.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for function update
        working-directory: .
        run: |
          aws lambda wait function-updated \
            --function-name "${{ steps.lambda.outputs.function_name }}" \
            --region ${{ env.AWS_REGION }}
